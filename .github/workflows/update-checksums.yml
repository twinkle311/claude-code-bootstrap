name: Update Hooks Checksums

on:
  schedule:
    # 每周一 UTC 02:00（北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        # GitHub Runner 不会自动注入 user.name / user.email；提前在 commit 之前配好，
        # 否则 commit 失败时 PowerShell 默认不 bail，会带空变更继续到 gh pr create。
        shell: pwsh
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          git config --global core.quotepath false

      - name: Download hooks and compute SHA256
        shell: pwsh
        run: |
          $DISLER_REPO = 'https://raw.githubusercontent.com/disler/claude-code-hooks-mastery/main/.claude'
          $USER_REPO   = 'https://raw.githubusercontent.com/ErgeAIA/claude-code-bootstrap/main/hooks'

          # 来源映射：本地相对路径 → (远程 URL, 文件名)
          $files = [ordered]@{
            'hooks/pre_tool_use.py'          = @{ Url = "$DISLER_REPO/hooks/pre_tool_use.py";          Name = 'pre_tool_use.py' }
            'hooks/post_tool_use.py'         = @{ Url = "$DISLER_REPO/hooks/post_tool_use.py";         Name = 'post_tool_use.py' }
            'hooks/session_start.py'         = @{ Url = "$DISLER_REPO/hooks/session_start.py";         Name = 'session_start.py' }
            'hooks/user_prompt_submit.py'    = @{ Url = "$DISLER_REPO/hooks/user_prompt_submit.py";    Name = 'user_prompt_submit.py' }
            'hooks/post_tool_use_failure.py' = @{ Url = "$DISLER_REPO/hooks/post_tool_use_failure.py"; Name = 'post_tool_use_failure.py' }
            'hooks/session_end.py'           = @{ Url = "$DISLER_REPO/hooks/session_end.py";           Name = 'session_end.py' }
            'status_lines/status_line_v6.py' = @{ Url = "$DISLER_REPO/status_lines/status_line_v6.py"; Name = 'status_line_v6.py' }
            'hooks/auto_format.py'           = @{ Url = "$USER_REPO/auto_format.py";                   Name = 'auto_format.py' }
            'hooks/block_dangerous.py'       = @{ Url = "$USER_REPO/block_dangerous.py";               Name = 'block_dangerous.py' }
            'hooks/check_secrets.py'         = @{ Url = "$USER_REPO/check_secrets.py";                 Name = 'check_secrets.py' }
            'hooks/verify_on_stop.py'        = @{ Url = "$USER_REPO/verify_on_stop.py";                Name = 'verify_on_stop.py' }
          }

          $newChecksums = [ordered]@{}
          $failures     = @()
          foreach ($entry in $files.GetEnumerator()) {
            $info    = $entry.Value
            $tmpFile = Join-Path $env:TEMP $info.Name
            try {
              Write-Host "Downloading $($info.Name)..."
              Invoke-WebRequest -Uri $info.Url -OutFile $tmpFile -TimeoutSec 30 -ErrorAction Stop
              $hash = (Get-FileHash -Path $tmpFile -Algorithm SHA256).Hash.ToUpper()
              $newChecksums[$info.Name] = $hash
              Write-Host "  SHA256: $hash"
            } catch {
              $failures += "$($info.Name): $_"
              Write-Host "  [ERR] $($info.Name): $_" -ErrorAction Continue
            } finally {
              Remove-Item $tmpFile -Force -ErrorAction SilentlyContinue
            }
          }

          if ($failures.Count -gt 0) {
            Write-Host "::error::Failed to download $($failures.Count) file(s):"
            $failures | ForEach-Object { Write-Host "::error::  $_" }
            exit 1
          }

          # Write new checksums.txt
          $lines = @(
            '# SHA256 checksums for downloaded hooks and status_line'
            '# Disler hooks: disler/claude-code-hooks-mastery'
            '# User hooks:   ErgeAIA/claude-code-bootstrap/hooks/'
            '# Verify with: Get-FileHash -Algorithm SHA256 <file> | Select-Object -ExpandProperty Hash'
          )
          foreach ($entry in $newChecksums.GetEnumerator()) {
            $lines += "$($entry.Key):$($entry.Value)"
          }
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText('checksums.txt', ($lines -join "`r`n"), $utf8NoBom)

          # Update $CHECKSUMS in setup-claude.ps1
          $setupContent = [System.IO.File]::ReadAllText('setup-claude.ps1', $utf8NoBom)
          $checksumsBlock = "@{`n"
          foreach ($entry in $newChecksums.GetEnumerator()) {
            $key = $entry.Key
            $pad = ' ' * ([Math]::Max(0, 24 - $key.Length))
            $checksumsBlock += "    '$key'$pad= '$($entry.Value)'`n"
          }
          $checksumsBlock += "}"
          $setupContent = $setupContent -replace "(?s)\`$CHECKSUMS = @\{.*?\}", "`$CHECKSUMS = $checksumsBlock"
          [System.IO.File]::WriteAllText('setup-claude.ps1', $setupContent, $utf8NoBom)

          Write-Host "checksums.txt and setup-claude.ps1 updated"

      - name: Check for changes
        id: diff
        shell: pwsh
        run: |
          $diff = git diff --name-only
          if ($diff) {
            Write-Host "Changes detected in: $diff"
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "No changes detected"
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $date  = Get-Date -Format 'yyyy-MM-dd'
          # 加 -<run_id> 后缀：避免多次失败/重跑时撞上 remote 上同日期残留的空 branch（force-push 风险太大）。
          # 同时历史记录里一眼能看出 PR 来自哪次 run，便于回溯。
          $branch = "update-checksums/$date-$env:RUN_ID"
          git checkout -b $branch
          git add checksums.txt setup-claude.ps1
          git commit -m "chore: update hooks checksums ($date)"
          git push origin $branch
          gh pr create `
            --title "chore: update hooks checksums ($date)" `
            --body "Upstream hooks from disler/claude-code-hooks-mastery have changed.`n`nPlease review the checksum updates before merging.`n`nAuto-generated by [update-checksums workflow]." `
            --base main
